services:
  api:
    build: .
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    command: >
      sh -c "alembic upgrade head &&
      gunicorn -k uvicorn.workers.UvicornWorker -c gunicorn_conf.py app.main:app"
    ports:
      - "8000:8000"

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
